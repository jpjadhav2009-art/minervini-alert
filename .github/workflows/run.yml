name: Minervini Alert

on:
  schedule:
    - cron: '45 9 * * 1-5'   # 3:15 PM IST (Mon–Fri)
  workflow_dispatch:           # lets you trigger manually to test

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests schedule pytz
      - run: python minervini_alert.py --now
